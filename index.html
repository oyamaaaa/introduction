<!DOCTYPE html>
<html class="staticrypt-html">

<head>
    <meta charset="utf-8" />
    <title>Protected Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- do not cache this page -->
    <meta http-equiv="cache-control" content="max-age=0" />
    <meta http-equiv="cache-control" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
    <meta http-equiv="pragma" content="no-cache" />

    <link rel="stylesheet" href="staticrypt.css" />
    <style>
        .hidden {
            display: none !important;
        }

        .staticrypt-spinner-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .staticrypt-spinner {
            display: inline-block;
            width: 2rem;
            height: 2rem;
            border: 0.25em solid var(--accent-color, gray);
            border-right-color: transparent;
            border-radius: 50%;
            animation: spinner-border 0.75s linear infinite;
        }

        @keyframes spinner-border {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div id="staticrypt_loading" class="staticrypt-spinner-container">
        <div class="staticrypt-spinner"></div>
    </div>

    <div id="staticrypt_content" class="staticrypt-page hidden">
        <div class="staticrypt-body">
            <div class="staticrypt-lock-icon">🔒</div>
            <h1 class="staticrypt-title">Protected Page</h1>
            <p class="staticrypt-instructions">このページはパスワードで保護されています。<br>閲覧するにはパスワードを入力してください。</p>

            <form id="staticrypt-form" class="staticrypt-form" action="#" method="post">
                <input id="staticrypt-password" class="staticrypt-input" type="password" name="password"
                    placeholder="パスワードを入力" autofocus />

                <label id="staticrypt-remember-label" class="staticrypt-remember hidden">
                    <input id="staticrypt-remember" type="checkbox" name="remember" />
                    Remember me
                </label>

                <input type="submit" class="staticrypt-decrypt-button" value="UNLOCK" />
            </form>

            <div class="staticrypt-footer">Powered by StatiCrypt</div>
        </div>
    </div>

            const password = document.getElementById("staticrypt-password").value,
